name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main # mainブランチにプッシュされた時に実行されます

# GitHub Pagesへのデプロイに必要な権限設定
permissions:
  contents: read
  pages: write
  id-token: write

# 同時実行を制御（古いデプロイをキャンセル）
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Create Firebase Config JSON
        run: |
          echo '${{ secrets.FIREBASE_CONFIG_JSON }}' > firebase-config.json

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.' # 現在のディレクトリのファイル群をアップロード

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
